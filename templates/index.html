<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>屋内K歌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a; color: #e0e0f0;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #1a1a2e; border-radius: 16px; padding: 40px;
      width: 100%; max-width: 600px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; color: #c084fc; }
    .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 32px; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    input[type="url"], input[type="file"] {
      width: 100%; padding: 12px 14px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 8px; color: #e0e0f0;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    input[type="url"]:focus { border-color: #c084fc; }
    .divider {
      text-align: center; color: #444; margin: 20px 0; font-size: 0.85rem; position: relative;
    }
    .divider::before, .divider::after {
      content: ""; position: absolute; top: 50%; width: 42%; height: 1px; background: #333;
    }
    .divider::before { left: 0; } .divider::after { right: 0; }
    button[type="submit"] {
      width: 100%; padding: 14px; margin-top: 24px;
      background: #7c3aed; color: white; border: none;
      border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #6d28d9; }
    button[type="submit"]:disabled { background: #4a4a6a; cursor: not-allowed; }
    #status { margin-top: 28px; display: none; }
    .spinner { display: flex; align-items: center; gap: 12px; color: #aaa; font-size: 0.9rem; }
    .spinner-ring {
      width: 22px; height: 22px; border: 3px solid #333;
      border-top-color: #c084fc; border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .song-title { font-size: 1.1rem; font-weight: 600; color: #c084fc; margin-bottom: 14px; }
    .lyrics-panel {
      background: #0f0f1a; border-radius: 10px; padding: 16px;
      height: 200px; overflow-y: auto; margin-bottom: 16px;
    }
    .lyric-line {
      padding: 6px 8px; border-radius: 6px; font-size: 0.95rem;
      color: #555; transition: color 0.3s, background 0.3s;
    }
    .lyric-line.active { color: #c084fc; font-weight: 600; background: #1a1a2e; }
    .lyrics-loading { color: #555; font-size: 0.85rem; font-style: italic; }
    audio { width: 100%; margin-bottom: 14px; accent-color: #c084fc; }
    .karaoke-controls { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-start { background: #059669; color: white; }
    .btn-start:hover:not(:disabled) { background: #047857; }
    .btn-stop { background: #dc2626; color: white; }
    .btn-stop:hover:not(:disabled) { background: #b91c1c; }
    .btn:disabled { background: #4a4a6a; cursor: not-allowed; }
    .mix-area { margin-top: 14px; }
    .action-btn {
      width: 100%; padding: 12px; background: #1e1e3a;
      border: 1px solid #7c3aed; color: #c084fc; border-radius: 8px;
      font-size: 0.9rem; cursor: pointer; transition: background 0.2s;
    }
    .action-btn:hover { background: #2a2a4a; }
    .download-btn {
      display: inline-block; padding: 10px 20px; margin-top: 10px;
      background: #1e1e3a; border: 1px solid #7c3aed;
      color: #c084fc; border-radius: 8px; text-decoration: none; font-size: 0.9rem;
    }
    .download-btn:hover { background: #2a2a4a; }
    .error-box {
      background: #2a1010; border: 1px solid #7f1d1d; border-radius: 8px;
      padding: 14px; color: #fca5a5; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all;
    }
    .rec-dot {
      display: inline-block; width: 9px; height: 9px; background: #dc2626;
      border-radius: 50%; margin-right: 6px; animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .mix-spinner { display: flex; align-items: center; gap: 10px; color: #aaa; font-size: 0.9rem; margin-top: 10px; }
    .mix-result { background: #0f0f1a; border-radius: 10px; padding: 16px; margin-top: 14px; }
    .mix-result-title { font-size: 0.8rem; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>屋内K歌</h1>
    <p class="subtitle">粘贴 YouTube 链接或上传音频，自动生成无人声伴奏</p>

    <form id="mainForm">
      <label for="urlInput">YouTube 链接</label>
      <input type="url" id="urlInput" name="url" placeholder="https://www.youtube.com/watch?v=..." />
      <div class="divider">或</div>
      <label for="fileInput">上传本地音频</label>
      <input type="file" id="fileInput" name="file" accept=".mp3,.wav,.m4a,.flac,.ogg,.aac" />
      <button type="submit" id="submitBtn">生成伴奏</button>
    </form>

    <div id="status"></div>
  </div>

  <script>
    const form = document.getElementById('mainForm');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    let currentJobId = null;
    let lyricLines = [];
    let lyricsTimer = null;
    let mediaRecorder = null;
    let recordChunks = [];
    let recordBlob = null;

    // ── Form submit ──────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('urlInput').value.trim();
      const file = document.getElementById('fileInput').files[0];
      if (!url && !file) { showError('请输入 YouTube 链接或上传音频文件'); return; }

      submitBtn.disabled = true;
      showSpinner('正在处理，M1 芯片大约需要 1-3 分钟，请稍候...');

      const fd = new FormData();
      if (url) fd.append('url', url);
      if (file) fd.append('file', file);

      try {
        const resp = await fetch('/process', { method: 'POST', body: fd });
        const data = await resp.json();
        if (!resp.ok || data.error) { showError(data.error || '未知错误'); }
        else { showKaraokeUI(data); }
      } catch (err) {
        showError('网络错误: ' + err.message);
      } finally {
        submitBtn.disabled = false;
      }
    });

    // ── Karaoke UI ───────────────────────────────────────────────
    function showKaraokeUI(data) {
      currentJobId = data.job_id;
      lyricLines = [];
      recordBlob = null;

      statusDiv.style.display = 'block';
      statusDiv.innerHTML = `
        <div class="song-title">${escapeHtml(data.title)}</div>
        <div class="lyrics-panel" id="lyricsPanel">
          <div class="lyrics-loading">歌词加载中…</div>
        </div>
        <audio id="audioPlayer" src="${escapeHtml(data.accompaniment_url)}" preload="auto"></audio>
        <div class="karaoke-controls">
          <button class="btn btn-start" id="btnStart" onclick="startKaraoke()">🎤 开始唱歌</button>
          <button class="btn btn-stop"  id="btnStop"  onclick="stopKaraoke()" disabled>⏹ 停止录音</button>
        </div>
        <div class="mix-area" id="mixArea"></div>
      `;

      document.getElementById('audioPlayer')
        .addEventListener('timeupdate', (e) => highlightLyric(e.target.currentTime));

      startLyricsPolling(data.lyrics_url);
    }

    // ── Lyrics polling ───────────────────────────────────────────
    function startLyricsPolling(lyricsUrl) {
      if (lyricsTimer) clearTimeout(lyricsTimer);
      fetch(lyricsUrl)
        .then(r => r.json())
        .then(data => {
          if (data.status === 'done' || data.status === 'error') {
            lyricLines = (data.status === 'done') ? (data.lines || []) : [];
            renderLyrics(data.status === 'error');
          } else {
            lyricsTimer = setTimeout(() => startLyricsPolling(lyricsUrl), 3000);
          }
        })
        .catch(() => {
          const p = document.getElementById('lyricsPanel');
          if (p) p.innerHTML = '<div class="lyrics-loading">歌词加载失败</div>';
        });
    }

    function renderLyrics(isError) {
      const panel = document.getElementById('lyricsPanel');
      if (!panel) return;
      if (isError || !lyricLines.length) {
        panel.innerHTML = `<div class="lyrics-loading">${isError ? '歌词获取失败' : '未找到歌词'}</div>`;
        return;
      }
      panel.innerHTML = lyricLines.map((l, i) =>
        `<div class="lyric-line" data-i="${i}">${escapeHtml(l.text)}</div>`
      ).join('');
    }

    function highlightLyric(currentTime) {
      if (!lyricLines.length) return;
      let active = -1;
      for (let i = 0; i < lyricLines.length; i++) {
        if (currentTime >= lyricLines[i].start) active = i; else break;
      }
      const items = document.querySelectorAll('.lyric-line');
      items.forEach((el, i) => {
        const was = el.classList.contains('active');
        el.classList.toggle('active', i === active);
        if (i === active && !was) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    // ── Recording ────────────────────────────────────────────────
    async function startKaraoke() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        recordChunks = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordChunks.push(e.data); };
        mediaRecorder.start(100);

        const player = document.getElementById('audioPlayer');
        player.currentTime = 0;
        player.play();

        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('mixArea').innerHTML =
          '<div style="color:#aaa;font-size:0.85rem;margin-top:4px"><span class="rec-dot"></span>录音中...</div>';
      } catch (err) {
        showError('无法访问麦克风: ' + err.message);
      }
    }

    function stopKaraoke() {
      const player = document.getElementById('audioPlayer');
      player.pause();

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.onstop = () => {
          recordBlob = new Blob(recordChunks, { type: 'audio/webm' });
          showMixButton();
        };
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
      }
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
    }

    function showMixButton() {
      const area = document.getElementById('mixArea');
      if (!area) return;
      area.innerHTML = `<button class="action-btn" onclick="uploadMix()">🎵 生成混音版本</button>`;
    }

    // ── Mix upload ───────────────────────────────────────────────
    async function uploadMix() {
      if (!recordBlob || !currentJobId) return;
      const area = document.getElementById('mixArea');
      area.innerHTML = `<div class="mix-spinner"><div class="spinner-ring"></div><span>混音处理中...</span></div>`;

      const fd = new FormData();
      fd.append('audio', recordBlob, 'vocal.webm');

      try {
        const resp = await fetch(`/mix/${currentJobId}`, { method: 'POST', body: fd });
        const data = await resp.json();
        if (!resp.ok || data.error) {
          area.innerHTML = `<div class="error-box">${escapeHtml(data.error || '混音失败')}</div>`;
        } else {
          area.innerHTML = `
            <div class="mix-result">
              <div class="mix-result-title">混音完成 — 对着它听听效果吧</div>
              <audio controls src="${escapeHtml(data.mixed_url)}"></audio>
              <a class="download-btn" href="/download/${escapeHtml(currentJobId)}/mixed.mp3" download>
                下载混音 MP3
              </a>
            </div>`;
        }
      } catch (err) {
        area.innerHTML = `<div class="error-box">网络错误: ${escapeHtml(err.message)}</div>`;
      }
    }

    // ── Helpers ──────────────────────────────────────────────────
    function showSpinner(msg) {
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = `<div class="spinner"><div class="spinner-ring"></div><span>${escapeHtml(msg)}</span></div>`;
    }

    function showError(msg) {
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
