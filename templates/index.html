<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>屋内K歌 - 伴奏生成器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #c084fc;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }
    input[type="url"], input[type="file"] {
      width: 100%;
      padding: 12px 14px;
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus { border-color: #c084fc; }
    .divider {
      text-align: center;
      color: #444;
      margin: 20px 0;
      font-size: 0.85rem;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #333;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #6d28d9; }
    button[type="submit"]:disabled { background: #4a4a6a; cursor: not-allowed; }

    /* 状态区域 */
    #status {
      margin-top: 28px;
      display: none;
    }
    .spinner {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #aaa;
      font-size: 0.9rem;
    }
    .spinner-ring {
      width: 22px; height: 22px;
      border: 3px solid #333;
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      background: #0f0f1a;
      border-radius: 10px;
      padding: 20px;
    }
    .result-title {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
      word-break: break-all;
    }
    audio {
      width: 100%;
      margin-bottom: 14px;
      accent-color: #c084fc;
    }
    .download-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #1e1e3a;
      border: 1px solid #7c3aed;
      color: #c084fc;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #2a2a4a; }

    .error-box {
      background: #2a1010;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 14px;
      color: #fca5a5;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>屋内K歌</h1>
    <p class="subtitle">粘贴 YouTube 链接或上传音频，自动生成无人声伴奏</p>

    <form id="mainForm">
      <label for="urlInput">YouTube 链接</label>
      <input type="url" id="urlInput" name="url" placeholder="https://www.youtube.com/watch?v=..." />

      <div class="divider">或</div>

      <label for="fileInput">上传本地音频</label>
      <input type="file" id="fileInput" name="file" accept=".mp3,.wav,.m4a,.flac,.ogg,.aac" />

      <button type="submit" id="submitBtn">生成伴奏</button>
    </form>

    <div id="status"></div>
  </div>

  <script>
    const form = document.getElementById('mainForm');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const url = document.getElementById('urlInput').value.trim();
      const file = document.getElementById('fileInput').files[0];

      if (!url && !file) {
        showError('请输入 YouTube 链接或上传音频文件');
        return;
      }

      submitBtn.disabled = true;
      showSpinner('正在处理，M1 芯片大约需要 1-3 分钟，请稍候...');

      const formData = new FormData();
      if (url) formData.append('url', url);
      if (file) formData.append('file', file);

      try {
        const resp = await fetch('/process', { method: 'POST', body: formData });
        const data = await resp.json();

        if (!resp.ok || data.error) {
          showError(data.error || '未知错误');
        } else {
          showResult(data);
        }
      } catch (err) {
        showError('网络错误: ' + err.message);
      } finally {
        submitBtn.disabled = false;
      }
    });

    function showSpinner(msg) {
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = `
        <div class="spinner">
          <div class="spinner-ring"></div>
          <span>${msg}</span>
        </div>`;
    }

    function showResult(data) {
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = `
        <div class="result">
          <div class="result-title">${escapeHtml(data.title)}</div>
          <audio controls src="${escapeHtml(data.accompaniment_url)}"></audio>
          <a class="download-btn" href="/download/${escapeHtml(data.job_id)}/accompaniment.mp3" download>
            下载伴奏 MP3
          </a>
        </div>`;
    }

    function showError(msg) {
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
