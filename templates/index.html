<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>屋内K歌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f1a; color: #e0e0f0;
      min-height: 100vh; display: flex;
      align-items: flex-start; justify-content: center; padding: 40px 20px;
    }
    .card {
      background: #1a1a2e; border-radius: 16px; padding: 40px;
      width: 100%; max-width: 680px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.6rem; margin-bottom: 8px; color: #c084fc; }
    .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 28px; }

    /* 搜索区 */
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input {
      flex: 1; padding: 12px 14px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 8px; color: #e0e0f0;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: #c084fc; }
    .search-row button {
      padding: 12px 18px; background: #4c1d95; color: white;
      border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .search-row button:hover { background: #5b21b6; }
    .search-row button:disabled { background: #4a4a6a; cursor: not-allowed; }

    /* 搜索结果 */
    #searchResults { margin-bottom: 20px; }
    .video-card {
      display: flex; gap: 12px; align-items: center;
      padding: 10px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s; border: 1px solid transparent;
    }
    .video-card:hover { background: #0f0f1a; border-color: #333; }
    .video-card.selected { background: #1e0f3a; border-color: #7c3aed; }
    .video-card img { width: 100px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .video-info { flex: 1; min-width: 0; }
    .video-title { font-size: 0.9rem; color: #e0e0f0; line-height: 1.3; margin-bottom: 4px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .video-duration { font-size: 0.78rem; color: #666; }

    /* 分割线 */
    .divider {
      text-align: center; color: #444; margin: 16px 0; font-size: 0.85rem; position: relative;
    }
    .divider::before, .divider::after {
      content: ""; position: absolute; top: 50%; width: 42%; height: 1px; background: #333;
    }
    .divider::before { left: 0; } .divider::after { right: 0; }

    /* 直接输入链接 */
    .url-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .url-row input {
      flex: 1; padding: 12px 14px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 8px; color: #e0e0f0;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s;
    }
    .url-row input:focus { border-color: #c084fc; }

    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    input[type="file"] {
      width: 100%; padding: 12px 14px; background: #0f0f1a;
      border: 1px solid #333; border-radius: 8px; color: #e0e0f0;
      font-size: 0.95rem; outline: none;
    }

    /* 生成按钮 */
    #generateBtn {
      width: 100%; padding: 14px; margin-top: 20px;
      background: #7c3aed; color: white; border: none;
      border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    #generateBtn:hover { background: #6d28d9; }
    #generateBtn:disabled { background: #4a4a6a; cursor: not-allowed; }

    /* 状态 / 结果 */
    #status { margin-top: 28px; display: none; }
    .spinner { display: flex; align-items: center; gap: 12px; color: #aaa; font-size: 0.9rem; }
    .spinner-ring {
      width: 22px; height: 22px; border: 3px solid #333;
      border-top-color: #c084fc; border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .song-title { font-size: 1.1rem; font-weight: 600; color: #c084fc; margin-bottom: 16px; }
    .yt-wrap {
      position: relative; padding-bottom: 56.25%;
      height: 0; margin-bottom: 16px; border-radius: 10px; overflow: hidden; background: #000;
    }
    .yt-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .player-section { background: #0f0f1a; border-radius: 10px; padding: 16px; }
    .player-label { font-size: 0.8rem; color: #666; margin-bottom: 8px; }
    audio { width: 100%; accent-color: #c084fc; margin-bottom: 12px; }
    .download-btn {
      display: inline-block; padding: 10px 20px;
      background: #1e1e3a; border: 1px solid #7c3aed;
      color: #c084fc; border-radius: 8px; text-decoration: none; font-size: 0.9rem;
      transition: background 0.2s;
    }
    .download-btn:hover { background: #2a2a4a; }
    .hint { margin-top: 12px; font-size: 0.8rem; color: #555; line-height: 1.5; }
    .error-box {
      background: #2a1010; border: 1px solid #7f1d1d; border-radius: 8px;
      padding: 14px; color: #fca5a5; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all;
    }
    .lyrics-panel {
      background: #0f0f1a; border-radius: 10px; padding: 16px;
      margin-top: 12px; max-height: 220px; overflow-y: auto;
      scroll-behavior: smooth;
    }
    .lyric-line {
      text-align: center; padding: 6px 4px; font-size: 0.88rem;
      color: #666; line-height: 1.6; transition: color 0.3s;
      cursor: default;
    }
    .lyric-line.active {
      color: #c084fc; font-size: 0.95rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>屋内K歌</h1>
    <p class="subtitle">搜索歌名，自动生成无人声伴奏，看着视频字幕唱</p>

    <!-- 搜索 -->
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="输入歌名搜索，如：my little airport 九龍公園" />
      <button id="searchBtn" onclick="doSearch()">搜索</button>
    </div>
    <div id="searchResults"></div>

    <div class="divider">或直接输入链接 / 上传文件</div>

    <div class="url-row">
      <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
    </div>

    <label for="fileInput">上传本地音频</label>
    <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.flac,.ogg,.aac" />

    <button id="generateBtn" onclick="doGenerate()">生成伴奏</button>

    <div id="status"></div>
  </div>

  <script>

    // ── 搜索 ──────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.textContent = '搜索中...';
      document.getElementById('searchResults').innerHTML = '';
      selectedVideoId = null;
      selectedUrl = null;

      try {
        const resp = await fetch('/search?q=' + encodeURIComponent(q));
        const data = await resp.json();
        if (!resp.ok || data.error) {
          document.getElementById('searchResults').innerHTML =
            '<div style="color:#888;font-size:0.85rem;padding:8px 0">' + escapeHtml(data.error || '搜索失败') + '</div>';
          return;
        }
        if (!data.length) {
          document.getElementById('searchResults').innerHTML =
            '<div style="color:#888;font-size:0.85rem;padding:8px 0">未找到结果</div>';
          return;
        }
        renderResults(data);
      } catch (err) {
        document.getElementById('searchResults').innerHTML =
          '<div style="color:#888;font-size:0.85rem;padding:8px 0">搜索出错: ' + escapeHtml(err.message) + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = '搜索';
      }
    }

    // 用事件委托处理搜索结果点击，避免 innerHTML 时序问题
    document.getElementById('searchResults').addEventListener('click', function(e) {
      const card = e.target.closest('.video-card');
      if (!card) return;
      // 高亮选中
      document.querySelectorAll('.video-card').forEach(el => el.classList.remove('selected'));
      card.classList.add('selected');
      // 把 URL 填入输入框
      document.getElementById('urlInput').value = card.dataset.url;
    });

    function renderResults(videos) {
      const container = document.getElementById('searchResults');
      container.innerHTML = videos.map((v, i) => {
        const dur = v.duration ? fmtDuration(v.duration) : '';
        return '<div class="video-card" id="vc' + i + '" data-url="' + escapeHtml(v.url) + '">'
          + '<img src="' + escapeHtml(v.thumbnail) + '" onerror="this.style.display=\'none\'">'
          + '<div class="video-info">'
          + '<div class="video-title">' + escapeHtml(v.title) + '</div>'
          + (dur ? '<div class="video-duration">' + dur + '</div>' : '')
          + '</div></div>';
      }).join('');
    }

    function fmtDuration(s) {
      s = Math.round(s);
      const m = Math.floor(s / 60), sec = s % 60;
      return m + ':' + String(sec).padStart(2, '0');
    }

    // ── 生成伴奏 ──────────────────────────────────────────────────
    async function doGenerate() {
      const url = document.getElementById('urlInput').value.trim();
      const file = document.getElementById('fileInput').files[0];

      if (!url && !file) {
        showError('请搜索并选择一首歌，或输入链接/上传文件');
        return;
      }

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      showSpinner('正在处理，约需 1-2 分钟...');

      const fd = new FormData();
      if (url) fd.append('url', url);
      if (file) fd.append('file', file);

      try {
        const resp = await fetch('/process', { method: 'POST', body: fd });
        const data = await resp.json();
        if (!resp.ok || data.error) { showError(data.error || '未知错误'); }
        else { showResult(data); }
      } catch (err) {
        showError('网络错误: ' + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    // ── 显示结果 ──────────────────────────────────────────────────
    function showResult(data) {
      const statusDiv = document.getElementById('status');
      statusDiv.style.display = 'block';
      let videoHtml = '';
      if (data.video_id) {
        const embedUrl = 'https://www.youtube.com/embed/' + encodeURIComponent(data.video_id)
          + '?mute=1&cc_load_policy=1&cc_lang_pref=zh-Hans&rel=0';
        videoHtml = '<div class="yt-wrap"><iframe src="' + embedUrl
          + '" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe></div>';
      }

      // Build lyrics panel HTML
      let lyricsHtml = '';
      const lyrics = data.lyrics;
      if (lyrics && lyrics.type === 'synced' && lyrics.lines && lyrics.lines.length > 0) {
        const linesHtml = lyrics.lines.map(function(line, idx) {
          return '<div class="lyric-line" data-time="' + line.time + '" data-idx="' + idx + '">'
            + escapeHtml(line.text) + '</div>';
        }).join('');
        lyricsHtml = '<div class="lyrics-panel" id="lyricsPanel">' + linesHtml + '</div>';
      } else if (lyrics && lyrics.type === 'plain' && lyrics.text) {
        lyricsHtml = '<div class="lyrics-panel" id="lyricsPanel">'
          + '<div style="white-space:pre-wrap;color:#aaa;font-size:0.88rem;line-height:1.7;">'
          + escapeHtml(lyrics.text) + '</div></div>';
      } else {
        lyricsHtml = '<div style="margin-top:10px;font-size:0.8rem;color:#444;text-align:center;">暂无歌词</div>';
      }

      statusDiv.innerHTML = '<div class="song-title">' + escapeHtml(data.title) + '</div>'
        + videoHtml
        + '<div class="player-section">'
        + '<div class="player-label">伴奏（调高音量，对着视频唱）</div>'
        + '<audio id="accompanimentAudio" controls src="' + escapeHtml(data.accompaniment_url) + '" preload="auto"></audio>'
        + '<a class="download-btn" href="/download/' + escapeHtml(data.job_id) + '/accompaniment.mp3" download>下载伴奏 MP3</a>'
        + '<div class="hint">先点视频播放（视频静音只看字幕），再点伴奏播放，跟着唱。</div>'
        + '</div>'
        + lyricsHtml;

      // Wire up synced lyrics highlighting
      if (lyrics && lyrics.type === 'synced' && lyrics.lines && lyrics.lines.length > 0) {
        const audioEl = document.getElementById('accompanimentAudio');
        const panel = document.getElementById('lyricsPanel');
        const lineEls = panel ? panel.querySelectorAll('.lyric-line') : [];
        const times = lyrics.lines.map(function(l) { return l.time; });

        audioEl.addEventListener('timeupdate', function() {
          const ct = audioEl.currentTime;
          // Find last line whose time <= ct
          let activeIdx = -1;
          for (let i = 0; i < times.length; i++) {
            if (times[i] <= ct) activeIdx = i;
            else break;
          }
          lineEls.forEach(function(el, i) {
            if (i === activeIdx) {
              if (!el.classList.contains('active')) {
                el.classList.add('active');
                // Auto-scroll to keep active line centered
                const panelRect = panel.getBoundingClientRect();
                const elRect = el.getBoundingClientRect();
                const offset = elRect.top - panelRect.top - panel.clientHeight / 2 + el.clientHeight / 2;
                panel.scrollTop += offset;
              }
            } else {
              el.classList.remove('active');
            }
          });
        });
      }
    }

    function showSpinner(msg) {
      const statusDiv = document.getElementById('status');
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = '<div class="spinner"><div class="spinner-ring"></div><span>' + escapeHtml(msg) + '</span></div>';
    }

    function showError(msg) {
      const statusDiv = document.getElementById('status');
      statusDiv.style.display = 'block';
      statusDiv.innerHTML = '<div class="error-box">' + escapeHtml(msg) + '</div>';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
